# https://doc.rust-lang.org/cargo/reference/workspaces.html
[workspace]
resolver = "3"
members = [".", "fuzz", "xtask"]

[workspace.package]
version = "0.1.0"
authors = ["Cathal Mullan <contact@cathal.dev>"]
edition = "2024"
rust-version = "1.89"
repository = "https://github.com/DuskSystems/duramen"
license = "MIT OR Apache-2.0"
keywords = ["cedar", "policy"]
categories = ["parser-implementations", "no-std"]

# https://doc.rust-lang.org/rustc/lints/groups.html
[workspace.lints.rust]
unsafe_code = "deny"

unused = { level = "deny", priority = -2 }
future-incompatible = { level = "deny", priority = -1 }
keyword-idents = { level = "deny", priority = -1 }
let-underscore = { level = "deny", priority = -1 }
nonstandard-style = { level = "deny", priority = -1 }
refining-impl-trait = { level = "deny", priority = -1 }
rust-2018-compatibility = { level = "deny", priority = -1 }
rust-2018-idioms = { level = "deny", priority = -1 }
rust-2021-compatibility = { level = "deny", priority = -1 }
rust-2024-compatibility = { level = "deny", priority = -1 }

# https://rust-lang.github.io/rust-clippy/master/index.html
[workspace.lints.clippy]
cargo = { level = "deny", priority = -1 }
complexity = { level = "deny", priority = -1 }
correctness = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
perf = { level = "deny", priority = -1 }
style = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }

# Correctness
arithmetic_side_effects = "deny"
expect_used = "deny"
future_not_send = "deny"
indexing_slicing = "deny"
non_zero_suggestions = "deny"
panic = "deny"
rest_pat_in_fully_bound_structs = "deny"
todo = "deny"
unimplemented = "deny"
unreachable = "deny"
unwrap_used = "deny"

# Errors
map_err_ignore = "deny"
try_err = "deny"
unused_result_ok = "deny"

# Performance
string_lit_chars_any = "deny"

# Clarity
allow_attributes = "deny"
allow_attributes_without_reason = "deny"
clone_on_ref_ptr = "deny"
impl_trait_in_params = "deny"
missing_assert_message = "deny"
same_name_method = "deny"
str_to_string = "deny"
unseparated_literal_suffix = "deny"
unused_trait_names = "deny"

# Style
deref_by_slicing = "deny"
mod_module_files = "deny"
redundant_type_annotations = "deny"
ref_patterns = "deny"
renamed_function_params = "deny"
return_and_then = "deny"
semicolon_outside_block = "deny"

# Imports
alloc_instead_of_core = "deny"
std_instead_of_alloc = "deny"
std_instead_of_core = "deny"
unnecessary_self_imports = "deny"

# Tests
cfg_not_test = "deny"
redundant_test_prefix = "deny"

# Documentation
doc_include_without_cfg = "deny"
missing_errors_doc = "deny"
missing_panics_doc = "deny"

# Debugging
dbg_macro = "deny"
print_stderr = "deny"
print_stdout = "deny"

# Relaxed
cognitive_complexity = "allow"
module_name_repetitions = "allow"
multiple_crate_versions = "allow"
new_without_default = "allow"
too_many_lines = "allow"

[workspace.dependencies]
cedar-policy = { version = "4.8", default-features = false }
cedar-policy-core = { version = "4.8", default-features = false }

# Syntax
syntree = { version = "0.18", default-features = false }

# SIMD
memchr = { version = "2.7", default-features = false }

# Collections
smallvec = { version = "1.15", default-features = false }

# Serialization
serde = { version = "1.0", default-features = false }
serde_json = { version = "1.0", default-features = false }
facet = { version = "0.42", default-features = false }
facet-json = { version = "0.42", default-features = false }
prost = { version = "0.14", default-features = false }
prost-build = { version = "0.14", default-features = false }

# Diagnostics
# FIXME: https://github.com/rust-lang/annotate-snippets-rs/issues/359
annotate-snippets = { git = "https://github.com/CathalMullan/annotate-snippets-rs", branch = "main", default-features = false }
anstream = { version = "0.6", default-features = false }

# Testing
insta = { version = "1.46", default-features = false }
datatest-stable = { version = "0.3", default-features = false }
similar-asserts = { version = "1.7", default-features = false }

# Fuzzing
arbitrary = { version = "1.4", default-features = false }
libfuzzer-sys = { version = "0.4", default-features = false }

# Benchmarking
divan = { version = "0.1", default-features = false }
gungraun = { version = "0.17", default-features = false }

# https://doc.rust-lang.org/cargo/reference/manifest.html
[package]
name = "duramen"
description = "A `cedar` parser."
include = [
  "/src",
  "/tests",
  "/CHANGELOG.md",
  "/LICENSE-APACHE",
  "/LICENSE-MIT",
  "/README.md",
]

version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[lints]
workspace = true

[features]
default = ["std"]
std = [
  "annotate-snippets/std",
  "syntree/std",
  "serde_json?/std",
  "facet?/std",
  "facet-json?/std",
  "prost?/std",
]
serde = ["dep:serde", "dep:serde_json"]
facet = ["dep:facet", "dep:facet-json"]
prost = ["dep:prost"]
arbitrary = ["std", "dep:arbitrary", "smallvec/arbitrary"]

[dependencies]
# Syntax
syntree = { workspace = true, features = ["alloc"] }

# SIMD
memchr = { workspace = true }

# Collections
smallvec = { workspace = true, features = ["const_new", "union"] }

# Diagnostics
annotate-snippets = { workspace = true, features = ["simd"] }

# Serialization
serde = { workspace = true, optional = true, features = ["derive", "alloc"] }
serde_json = { workspace = true, optional = true, features = ["alloc"] }
facet = { workspace = true, optional = true, features = ["alloc"] }
facet-json = { workspace = true, optional = true }
prost = { workspace = true, optional = true, features = ["derive"] }

# Fuzzing
arbitrary = { workspace = true, optional = true, features = ["derive"] }

[dev-dependencies]
# Upstream
cedar-policy = { workspace = true, features = ["protobufs"] }
cedar-policy-core = { workspace = true, features = ["ipaddr", "decimal", "datetime"] }

# Serialization
serde_json = { workspace = true }
facet-json = { workspace = true, features = ["fast", "jit"] }

# Diagnostics
annotate-snippets = { workspace = true }
anstream = { workspace = true }

# Testing
insta = { workspace = true }
datatest-stable = { workspace = true }
similar-asserts = { workspace = true }

# Benchmarking
divan = { workspace = true }
gungraun = { workspace = true, features = ["default"] }

[[test]]
name = "policy_fixtures"
harness = false

[[test]]
name = "policy_fixtures_serde"
harness = false
required-features = ["serde"]

[[test]]
name = "policy_fixtures_facet"
harness = false
required-features = ["facet"]

[[test]]
name = "policy_fixtures_prost"
harness = false
required-features = ["prost"]

[[test]]
name = "schema_fixtures"
harness = false

[[test]]
name = "schema_fixtures_serde"
harness = false
required-features = ["serde"]

[[test]]
name = "schema_fixtures_facet"
harness = false
required-features = ["facet"]

[[bench]]
name = "divan"
harness = false
required-features = ["serde", "facet", "prost"]

[[bench]]
name = "gungraun"
harness = false
required-features = ["serde", "facet", "prost"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--html-in-header", "docs/arborium.html"]
