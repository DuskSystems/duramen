[package]
name = "duramen-fuzz"
publish = false

version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[package.metadata]
cargo-fuzz = true

[lints]
workspace = true

[dependencies]
duramen = { path = "..", features = ["serde", "prost", "arbitrary"] }
cedar-policy = { workspace = true, features = ["protobufs"] }

# Serialization
serde_json = { workspace = true }

# Testing
similar-asserts = { workspace = true }

# Fuzzing
libfuzzer-sys = { workspace = true, features = ["link_libfuzzer"] }

[[bin]]
name = "policy"
path = "fuzz_targets/policy.rs"
test = false
doc = false
bench = false

[[bin]]
name = "policy_arbitrary"
path = "fuzz_targets/policy_arbitrary.rs"
test = false
doc = false
bench = false

[[bin]]
name = "policy_prost"
path = "fuzz_targets/policy_prost.rs"
test = false
doc = false
bench = false

[[bin]]
name = "schema"
path = "fuzz_targets/schema.rs"
test = false
doc = false
bench = false

[[bin]]
name = "schema_arbitrary"
path = "fuzz_targets/schema_arbitrary.rs"
test = false
doc = false
bench = false
